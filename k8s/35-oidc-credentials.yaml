# Keycloak/OIDC credentials consumed by the plugin's firstrun.sh install hook.
#
# DO NOT commit real credentials. Prefer a sealed/managed secret (SealedSecrets,
# External Secrets, SOPS) in production; this stringData sample is for illustration.
#
# The client must be a CONFIDENTIAL OAuth2 client in Keycloak with:
#   - Standard flow (Authorization Code) enabled
#   - a client secret (client-secret below)
#   - a valid redirect URI of  <public-origin>/sso/callback
#     e.g. https://jellyfin.example.com/sso/callback
apiVersion: v1
kind: Secret
metadata:
  name: oidc-creds
  namespace: media
type: Opaque
stringData:
  issuer: "https://keycloak.example.com/realms/media"
  client-id: "jellyfin"
  client-secret: "REPLACE_ME"
